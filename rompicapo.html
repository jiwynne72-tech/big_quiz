<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Rompicapo - Italiano migliorato</title><style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:20px}.container{max-width:700px;margin:auto;background:#fff;padding:24px;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.2)}#ind{font-size:1.35em;font-weight:bold;margin:20px 0}.box{display:none;background:#eef6ff;padding:12px;border-radius:8px;margin-top:12px}button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:8px;font-size:16px}.a{background:#3498db;color:#fff}.b{background:#27ae60;color:#fff}.c{background:#e67e22;color:#fff}
</style></head><body><div class="container"><h1>30 Rompicapo</h1><div id="num"></div><div id="ind"></div><div id="sug" class="box"></div><div id="risp" class="box"></div><button class="a" onclick="mh()">💡 Suggerimento</button><button class="b" onclick="mr()">👁️ Mostra risposta</button><button class="c" onclick="nx()">➡️ Successivo</button></div>
<script>
const d=[{q:"Hai due corde che impiegano esattamente un'ora a bruciare, ma non bruciano in modo uniforme. Come puoi misurare 45 minuti?",s:"Una corda può bruciare più velocemente in alcuni punti e più lentamente in altri. Usa entrambe le corde.",r:"Accendi la prima corda da entrambe le estremità e la seconda da una sola estremità. La prima finirà di bruciare dopo 30 minuti. In quel momento accendi anche l'altra estremità della seconda corda. Poiché le restano 30 minuti di combustione, bruciandola da entrambe le estremità terminerà in 15 minuti. In totale saranno passati 45 minuti."},{q:"Un contadino deve attraversare un fiume con una volpe, una gallina e un sacco di grano. La barca può trasportare solo lui e un elemento alla volta. Cosa deve portare per primo?",s:"Non può lasciare la volpe da sola con la gallina, né la gallina da sola con il grano.",r:"Deve portare per prima la gallina. In questo modo evita che la volpe la mangi o che la gallina mangi il grano."},{q:"Tre interruttori comandano tre lampadine in una stanza chiusa. Puoi entrare nella stanza una sola volta. Come fai a capire quale interruttore controlla ogni lampadina?",s:"Una lampadina può essere calda anche se è spenta.",r:"Accendi il primo interruttore per qualche minuto, poi spegnilo. Accendi il secondo ed entra nella stanza. La lampadina accesa appartiene al secondo interruttore. Quella spenta ma calda appartiene al primo. Quella spenta e fredda appartiene al terzo."},{q:"Un padre e un figlio hanno insieme 66 anni. L'età del padre è formata dalle stesse due cifre dell'età del figlio, ma in ordine inverso.",s:"Prova le coppie di numeri con cifre invertite che sommano 66.",r:"Il padre ha 51 anni e il figlio 15 anni."},{q:"Quale pesa di più: un chilogrammo di piume o un chilogrammo di ferro?",s:"Confronta le unità di misura, non il materiale.",r:"Pesano esattamente uguale: entrambi sono un chilogrammo."},{q:"Un treno elettrico viaggia verso nord mentre soffia un forte vento da sud. Da quale parte va il fumo?",s:"Leggi con attenzione il tipo di treno.",r:"Da nessuna parte, perché un treno elettrico non produce fumo."},{q:"Quattro persone impiegano rispettivamente 1, 2, 7 e 10 minuti per attraversare un ponte. Devono usare un'unica torcia e possono attraversare al massimo in due.",s:"I due più veloci devono riportare la torcia quando serve.",r:"La strategia migliore richiede 17 minuti. I tempi sono: 1 e 2 attraversano, torna l'1; attraversano 7 e 10, torna il 2; infine attraversano di nuovo 1 e 2."},{q:"Hai 12 monete. Una è falsa e ha un peso diverso dalle altre. Qual è il numero minimo di pesate necessarie con una bilancia a due piatti per individuarla?",s:"Ogni pesata deve eliminare molte possibilità.",r:"Servono al massimo tre pesate."},{q:"Una lumaca sale di 3 metri ogni giorno e durante la notte scivola indietro di 2 metri. Quanto tempo impiega per salire un palo alto 10 metri?",s:"L'ultimo giorno non scivola più indietro.",r:"Impiega 8 giorni. Quando raggiunge la cima durante il giorno, il problema è concluso."},{q:"Due padri e due figli mangiano tre mele, una a testa. Com'è possibile?",s:"Le persone non sono necessariamente quattro.",r:"Sono tre persone: un nonno, suo figlio e suo nipote."},{q:"Che cosa compare una volta nella parola 'minuto', due volte nella parola 'momento' e mai nella parola 'anno'?",s:"Non cercare un numero: osserva le lettere.",r:"È la lettera M."},{q:"Quale numero segue la sequenza 2, 6, 12, 20, 30?",s:"Osserva le differenze fra i numeri.",r:"Il numero successivo è 42."},{q:"Un uomo nasce nella stanza 2000 e muore nella stanza 1995. Com'è possibile?",s:"I numeri non indicano necessariamente degli anni.",r:"2000 e 1995 sono numeri di stanze, non anni."},{q:"Come puoi mettere un tappo dentro una bottiglia senza toccare direttamente il tappo?",s:"Puoi muovere la bottiglia.",r:"Appoggia la bottiglia sul tappo e spingila verso il basso."},{q:"Quale numero segue la successione di Fibonacci: 1, 1, 2, 3, 5, 8, 13?",s:"Ogni numero nasce dalla somma dei due precedenti.",r:"Il numero successivo è 21."},{q:"Più ne togli, più diventa grande. Che cos'è?",s:"Pensa a qualcosa scavato.",r:"Una buca."},{q:"Quale mese ha 28 giorni?",s:"Non limitarti a febbraio.",r:"Tutti i mesi hanno almeno 28 giorni."},{q:"Prima di essere usata deve essere rotta. Che cos'è?",s:"È un alimento.",r:"Un uovo."},{q:"Ha città, montagne e fiumi, ma non contiene persone né acqua vera.",s:"È fatta di carta o mostrata su uno schermo.",r:"Una mappa."},{q:"Entra asciutta nell'acqua ed esce bagnata.",s:"Si usa per preparare una bevanda.",r:"Una bustina di tè."},{q:"Ha un occhio ma non può vedere.",s:"Serve per cucire.",r:"Un ago."},{q:"È tuo, ma gli altri lo pronunciano più spesso di te.",s:"Ti identifica.",r:"Il tuo nome."},{q:"Quale parola è sempre scritta correttamente nel dizionario?",s:"È un gioco di parole.",r:"La parola 'correttamente'."},{q:"Che cosa può riempire una stanza senza occupare spazio?",s:"Basta premere un interruttore.",r:"La luce."},{q:"Cinque gatti catturano cinque topi in cinque minuti. Quanti gatti servono per catturare 100 topi in 100 minuti?",s:"Ogni gatto mantiene lo stesso ritmo.",r:"Servono cinque gatti."},{q:"Un orologio segna le tre. Quanti rintocchi suona?",s:"Conta le ore.",r:"Tre rintocchi."},{q:"Qual è la metà di due più due?",s:"Interpreta correttamente la frase.",r:"La metà di due è uno; uno più due fa tre."},{q:"Più condividi una cosa, meno resta soltanto tua. Che cos'è?",s:"Pensa alle informazioni riservate.",r:"Un segreto."},{q:"Se ieri era domenica, che giorno sarà dopodomani?",s:"Vai avanti un giorno alla volta.",r:"Sarà mercoledì."},{q:"Un cubo ha sei facce. Quante facce hanno due cubi separati?",s:"I cubi non sono uniti.",r:"Dodici facce."}];let i=0;
function load(){num.textContent=`Rompicapo ${i+1} di ${d.length}`;ind.textContent=d[i].q;sug.style.display='none';risp.style.display='none';sug.innerHTML='<b>Suggerimento:</b><br>'+d[i].s;risp.innerHTML='<b>Spiegazione e risposta:</b><br>'+d[i].r;}
function mh(){sug.style.display='block';} function mr(){risp.style.display='block';}
function nx(){if(i<d.length-1){i++;load();}else alert('Complimenti! Hai completato tutti i rompicapo.');}
load();
</script></body></html>
